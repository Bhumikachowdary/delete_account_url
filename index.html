<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Account - AIMint</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .card {
            background: #ffffff;
            padding: 40px;
            border-radius: 15px;
            width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 {
            color: #2563eb;
            font-size: 24px;
            margin-bottom: 10px;
        }

        p {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 25px;
        }

        input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        textarea {
            resize: none;
            height: 80px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #dc2626;
        }

        @media (max-width: 500px) {
            .card {
                width: 90%;
                padding: 25px;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h1>Delete Your AIMint Account</h1>
        <p>
            We're sorry to see you go. Please submit this form to request
            permanent deletion of your account.
        </p>

        <form>
            <input type="text" placeholder="Enter your full name" required>
            <input type="email" placeholder="Enter your registered email" required>
            <input type="tel" placeholder="Registered phone number" required>
            <textarea placeholder="Reason for leaving (optional)"></textarea>

            <button type="submit">Delete My Account</button>
        </form>
    </div>

</body>
</html>
